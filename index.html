  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Машина што учи</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <p id="status">Чекајте TF.js да се вчита</p>
    <div class="main-panel">
      <div class="video-panel">
        <video id="webcam" playsinline muted></video>
        <div class="controls-row">
          <button id="enableCam">Вклучи камера</button>
          <select id="cameraSelect" style="display:none;">
            <option value="">Избери Камера</option>
          </select>
          <div class="class-controls" id="classControls"></div>
          <button id="addClass" type="button">+ Класа</button>

          <button id="reset">Ресетирај</button>
          <button id="train">Тренирај</button>
        </div>
      </div>
      <div id="snapshots"></div>
    </div>
  </div>
  <iframe src="https://footer-mkd.netlify.app/" frameborder="0"></iframe>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"> </script>
  <script src="script.js"></script>
